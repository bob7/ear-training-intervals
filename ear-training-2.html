<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Ear Training Dashboard</title>
    <style>
:root {
  color-scheme: light;
  --paper: #f7f4ee;
  --surface: #fffdf8;
  --surface-strong: #ffffff;
  --ink: #1d2228;
  --muted: #68727d;
  --line: #ddd4c6;
  --line-strong: #b9c2c9;
  --teal: #16837a;
  --teal-soft: #d9eeea;
  --amber: #d78b18;
  --amber-soft: #f7e5bd;
  --coral: #c95643;
  --coral-soft: #f4d9d2;
  --indigo: #4c5f9f;
  --indigo-soft: #dfe5ff;
  --green: #377d50;
  --red: #b84343;
  --shadow: 0 16px 40px rgba(47, 39, 28, 0.11);
}

* {
  box-sizing: border-box;
}

body {
  margin: 0;
  min-height: 100vh;
  background:
    linear-gradient(90deg, rgba(29, 34, 40, 0.035) 1px, transparent 1px),
    linear-gradient(180deg, rgba(29, 34, 40, 0.03) 1px, transparent 1px),
    var(--paper);
  background-size: 36px 36px;
  color: var(--ink);
  font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  line-height: 1.45;
}

button,
select,
input {
  font: inherit;
}

button {
  border: 0;
}

.app-shell {
  width: min(1180px, calc(100% - 32px));
  margin: 0 auto;
  padding: 28px 0 40px;
}

.topbar,
.metric-strip,
.workspace,
.panel-heading,
.transport,
.history-list li,
.field-row,
.switch-row {
  display: flex;
  align-items: center;
}

.topbar {
  justify-content: space-between;
  gap: 20px;
  margin-bottom: 22px;
}

.eyebrow {
  margin: 0 0 4px;
  color: var(--teal);
  font-size: 0.78rem;
  font-weight: 800;
  letter-spacing: 0;
  text-transform: uppercase;
}

h1,
h2 {
  margin: 0;
  letter-spacing: 0;
}

h1 {
  font-size: 2.2rem;
  line-height: 1.05;
}

h2 {
  font-size: 1.15rem;
}

.top-actions {
  display: flex;
  gap: 10px;
}

.icon-button,
.transport-button {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  border: 1px solid var(--line);
  border-radius: 8px;
  background: var(--surface-strong);
  color: var(--ink);
  cursor: pointer;
  transition: transform 140ms ease, border-color 140ms ease, background 140ms ease;
}

.icon-button {
  width: 44px;
  height: 44px;
  font-size: 1.25rem;
}

.icon-button:hover,
.transport-button:hover,
.answer-button:hover,
.text-button:hover,
.mode-tab:hover {
  transform: translateY(-1px);
  border-color: var(--teal);
}

.icon-button:focus-visible,
.transport-button:focus-visible,
.answer-button:focus-visible,
.text-button:focus-visible,
.mode-tab:focus-visible,
select:focus-visible,
input:focus-visible {
  outline: 3px solid rgba(22, 131, 122, 0.25);
  outline-offset: 2px;
}

.metric-strip {
  display: grid;
  grid-template-columns: repeat(4, minmax(0, 1fr));
  gap: 12px;
  margin-bottom: 16px;
}

.metric {
  min-height: 118px;
  padding: 18px;
  border: 1px solid var(--line);
  border-left-width: 5px;
  border-radius: 8px;
  background: var(--surface);
  box-shadow: 0 8px 24px rgba(47, 39, 28, 0.06);
}

.metric-label,
.metric-note {
  display: block;
  color: var(--muted);
  font-size: 0.85rem;
}

.metric strong {
  display: block;
  margin: 4px 0;
  font-size: 2rem;
  line-height: 1.1;
}

.accent-score {
  border-left-color: var(--teal);
}

.accent-accuracy {
  border-left-color: var(--amber);
}

.accent-streak {
  border-left-color: var(--coral);
}

.accent-bank {
  border-left-color: var(--indigo);
}

.practice-area {
  display: grid;
  gap: 16px;
}

.workspace {
  align-items: stretch;
  gap: 16px;
}

.trainer-panel,
.side-panel section,
.history-panel {
  border: 1px solid var(--line);
  border-radius: 8px;
  background: rgba(255, 253, 248, 0.94);
  box-shadow: var(--shadow);
}

.trainer-panel {
  flex: 1 1 auto;
  min-width: 0;
  padding: 18px;
}

.side-panel {
  display: grid;
  width: 330px;
  gap: 16px;
}

.side-panel section,
.history-panel {
  padding: 16px;
}

.panel-heading {
  justify-content: space-between;
  gap: 12px;
  margin-bottom: 14px;
}

.panel-heading.compact {
  margin-bottom: 12px;
}

.pill {
  display: inline-flex;
  align-items: center;
  min-height: 30px;
  padding: 4px 10px;
  border-radius: 999px;
  background: var(--teal-soft);
  color: #115d57;
  font-size: 0.82rem;
  font-weight: 800;
}

.mode-tabs {
  display: grid;
  grid-template-columns: repeat(4, minmax(0, 1fr));
  gap: 8px;
  margin-bottom: 14px;
}

.mode-tab {
  min-height: 42px;
  padding: 9px 10px;
  border: 1px solid var(--line);
  border-radius: 8px;
  background: var(--surface-strong);
  color: var(--muted);
  cursor: pointer;
  font-weight: 750;
}

.mode-tab.is-active {
  border-color: #8bc3bc;
  background: var(--teal-soft);
  color: #0f5e57;
}

.sound-stage {
  position: relative;
  overflow: hidden;
  min-height: 260px;
  border: 1px solid var(--line);
  border-radius: 8px;
  background:
    radial-gradient(circle at 16% 18%, rgba(215, 139, 24, 0.14), transparent 26%),
    radial-gradient(circle at 88% 14%, rgba(76, 95, 159, 0.13), transparent 30%),
    linear-gradient(180deg, #fffdf8 0%, #f3efe6 100%);
}

#staffCanvas {
  display: block;
  width: 100%;
  height: 260px;
}

.challenge-meta {
  position: absolute;
  left: 14px;
  right: 14px;
  bottom: 12px;
  display: flex;
  justify-content: space-between;
  gap: 12px;
  color: var(--muted);
  font-size: 0.84rem;
  font-weight: 750;
}

.transport {
  gap: 8px;
  margin: 14px 0;
}

.transport-button {
  min-width: 48px;
  min-height: 46px;
  padding: 10px 14px;
  font-weight: 800;
}

.primary-action {
  gap: 8px;
  min-width: 118px;
  background: var(--ink);
  color: #ffffff;
}

.primary-action:hover {
  background: #2c3238;
}

.answer-grid {
  display: grid;
  grid-template-columns: repeat(4, minmax(0, 1fr));
  gap: 10px;
}

.answer-button {
  min-height: 58px;
  padding: 10px 8px;
  border: 1px solid var(--line);
  border-radius: 8px;
  background: var(--surface-strong);
  color: var(--ink);
  cursor: pointer;
  font-weight: 800;
  transition: transform 140ms ease, border-color 140ms ease, background 140ms ease;
}

.answer-button.is-correct {
  border-color: rgba(55, 125, 80, 0.55);
  background: #dff0e2;
  color: #214f32;
}

.answer-button.is-wrong {
  border-color: rgba(184, 67, 67, 0.5);
  background: #f3dada;
  color: #7a2c2c;
}

.answer-button:disabled {
  cursor: default;
}

.field-row,
.switch-row {
  justify-content: space-between;
  gap: 12px;
  padding: 10px 0;
  border-top: 1px solid rgba(221, 212, 198, 0.72);
}

.field-row:first-of-type {
  border-top: 0;
}

.field-row span,
.switch-row span {
  color: var(--muted);
  font-weight: 750;
}

select {
  min-height: 38px;
  max-width: 168px;
  border: 1px solid var(--line);
  border-radius: 8px;
  background: var(--surface-strong);
  color: var(--ink);
  padding: 6px 9px;
}

input[type="range"] {
  width: 110px;
  accent-color: var(--teal);
}

input[type="checkbox"] {
  width: 42px;
  height: 24px;
  accent-color: var(--teal);
}

output {
  min-width: 70px;
  color: var(--ink);
  font-weight: 800;
  text-align: right;
}

.result-box {
  min-height: 94px;
  padding: 14px;
  border: 1px solid var(--line);
  border-radius: 8px;
  background: var(--surface-strong);
}

.result-box strong,
.result-box span {
  display: block;
}

.result-box strong {
  margin-bottom: 6px;
  font-size: 1.2rem;
}

.result-box span {
  color: var(--muted);
}

.result-box.correct {
  border-color: rgba(55, 125, 80, 0.45);
  background: #edf8ee;
}

.result-box.wrong {
  border-color: rgba(184, 67, 67, 0.4);
  background: #fff0ee;
}

.skill-list {
  display: grid;
  gap: 12px;
}

.skill-row {
  display: grid;
  gap: 6px;
}

.skill-row header {
  display: flex;
  justify-content: space-between;
  gap: 8px;
  color: var(--muted);
  font-size: 0.85rem;
  font-weight: 800;
}

.skill-track {
  overflow: hidden;
  height: 9px;
  border-radius: 999px;
  background: #ece4d8;
}

.skill-fill {
  width: 0;
  height: 100%;
  border-radius: inherit;
  background: var(--teal);
  transition: width 220ms ease;
}

.skill-row:nth-child(2) .skill-fill {
  background: var(--amber);
}

.skill-row:nth-child(3) .skill-fill {
  background: var(--coral);
}

.skill-row:nth-child(4) .skill-fill {
  background: var(--indigo);
}

.history-panel {
  box-shadow: 0 8px 24px rgba(47, 39, 28, 0.07);
}

.text-button {
  min-height: 34px;
  padding: 6px 10px;
  border: 1px solid var(--line);
  border-radius: 8px;
  background: var(--surface-strong);
  color: var(--ink);
  cursor: pointer;
  font-weight: 800;
}

.history-list {
  display: grid;
  gap: 8px;
  margin: 0;
  padding: 0;
  list-style: none;
}

.history-list li {
  justify-content: space-between;
  gap: 12px;
  min-height: 48px;
  padding: 10px 12px;
  border: 1px solid var(--line);
  border-radius: 8px;
  background: var(--surface-strong);
}

.history-main {
  display: grid;
  gap: 2px;
}

.history-main strong {
  font-size: 0.95rem;
}

.history-main span,
.history-score {
  color: var(--muted);
  font-size: 0.84rem;
  font-weight: 750;
}

.empty-history {
  color: var(--muted);
}

@media (max-width: 920px) {
  .metric-strip {
    grid-template-columns: repeat(2, minmax(0, 1fr));
  }

  .workspace {
    display: grid;
  }

  .side-panel {
    width: auto;
    grid-template-columns: repeat(3, minmax(0, 1fr));
  }
}

@media (max-width: 720px) {
  .app-shell {
    width: min(100% - 20px, 1180px);
    padding-top: 18px;
  }

  .topbar {
    align-items: flex-start;
  }

  h1 {
    font-size: 1.75rem;
  }

  .metric-strip,
  .mode-tabs,
  .answer-grid,
  .side-panel {
    grid-template-columns: 1fr;
  }

  .metric {
    min-height: 96px;
  }

  .sound-stage,
  #staffCanvas {
    min-height: 220px;
    height: 220px;
  }

  .field-row {
    align-items: flex-start;
    flex-direction: column;
  }

  select,
  input[type="range"] {
    width: 100%;
    max-width: none;
  }

  output {
    text-align: left;
  }
}
    </style>
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">Practice room</p>
          <h1>Ear Training Dashboard</h1>
        </div>
        <div class="top-actions" aria-label="Session controls">
          <button class="icon-button" id="muteToggle" type="button" title="Toggle sound" aria-label="Toggle sound">
            <span aria-hidden="true">♪</span>
          </button>
          <button class="icon-button" id="resetSession" type="button" title="Reset session" aria-label="Reset session">
            <span aria-hidden="true">↺</span>
          </button>
        </div>
      </header>

      <main class="dashboard">
        <section class="metric-strip" aria-label="Scoreboard">
          <article class="metric accent-score">
            <span class="metric-label">Session score</span>
            <strong id="sessionScore">0</strong>
            <span id="lastDelta" class="metric-note">Ready</span>
          </article>
          <article class="metric accent-accuracy">
            <span class="metric-label">Accuracy</span>
            <strong id="accuracy">0%</strong>
            <span id="answerCount" class="metric-note">0 answers</span>
          </article>
          <article class="metric accent-streak">
            <span class="metric-label">Streak</span>
            <strong id="streak">0</strong>
            <span id="bestStreak" class="metric-note">Best 0</span>
          </article>
          <article class="metric accent-bank">
            <span class="metric-label">All-time</span>
            <strong id="allTimeScore">0</strong>
            <span id="allTimeAttempts" class="metric-note">0 attempts</span>
          </article>
        </section>

        <section class="practice-area">
          <div class="workspace">
            <section class="trainer-panel" aria-label="Exercise">
              <div class="panel-heading">
                <div>
                  <p class="eyebrow">Exercise</p>
                  <h2 id="exerciseTitle">Intervals</h2>
                </div>
                <span class="pill" id="difficultyLabel">Level 1</span>
              </div>

              <div class="mode-tabs" role="tablist" aria-label="Exercise mode">
                <button class="mode-tab is-active" type="button" data-mode="intervals">Intervals</button>
                <button class="mode-tab" type="button" data-mode="chords">Chords</button>
                <button class="mode-tab" type="button" data-mode="scale">Scale degrees</button>
                <button class="mode-tab" type="button" data-mode="rhythm">Rhythm</button>
              </div>

              <div class="sound-stage">
                <canvas id="staffCanvas" width="780" height="260" aria-label="Musical staff visualization"></canvas>
                <div class="challenge-meta">
                  <span id="challengeNumber">Question 1</span>
                  <span id="challengeKey">C major</span>
                </div>
              </div>

              <div class="transport" aria-label="Audio controls">
                <button class="transport-button primary-action" id="playChallenge" type="button">
                  <span aria-hidden="true">▶</span>
                  <span>Play</span>
                </button>
                <button class="transport-button" id="repeatChallenge" type="button" title="Repeat" aria-label="Repeat">
                  <span aria-hidden="true">⟲</span>
                </button>
                <button class="transport-button" id="nextChallenge" type="button" title="Next" aria-label="Next">
                  <span aria-hidden="true">→</span>
                </button>
              </div>

              <div class="answer-grid" id="answerGrid" aria-label="Answers"></div>
            </section>

            <aside class="side-panel" aria-label="Progress">
              <section class="settings-panel">
                <div class="panel-heading compact">
                  <h2>Settings</h2>
                </div>
                <label class="field-row">
                  <span>Level</span>
                  <select id="difficultySelect">
                    <option value="1">1 - Core sounds</option>
                    <option value="2">2 - Wider range</option>
                    <option value="3">3 - Full set</option>
                  </select>
                </label>
                <label class="field-row">
                  <span>Tempo</span>
                  <input id="tempoControl" type="range" min="64" max="132" step="4" value="88">
                  <output id="tempoOutput" for="tempoControl">88 BPM</output>
                </label>
                <label class="switch-row">
                  <span>Auto-play</span>
                  <input id="autoPlayToggle" type="checkbox">
                </label>
              </section>

              <section class="result-panel">
                <div class="panel-heading compact">
                  <h2>Last result</h2>
                </div>
                <div class="result-box" id="resultBox">
                  <strong>No answer yet</strong>
                  <span>Your score will appear here.</span>
                </div>
              </section>

              <section class="skill-panel">
                <div class="panel-heading compact">
                  <h2>Skill mix</h2>
                </div>
                <div class="skill-list" id="skillList"></div>
              </section>
            </aside>
          </div>

          <section class="history-panel" aria-label="Recent attempts">
            <div class="panel-heading compact">
              <h2>Recent attempts</h2>
              <button class="text-button" id="clearHistory" type="button">Clear</button>
            </div>
            <ol class="history-list" id="historyList"></ol>
          </section>
        </section>
      </main>
    </div>

    <script>

        ],
        [

          { label: "Tresillo", pattern: [0, 1.5, 3], accents: [0] },
          { label: "Sixteenth run", pattern: [0, 0.25, 0.5, 0.75, 1, 2, 2.25, 2.5, 2.75, 3], accents: [0, 2] }
        ]
      ]
    }
  };

  var NOTE_NAMES = ["C", "C♯", "D", "E♭", "E", "F", "F♯", "G", "A♭", "A", "B♭", "B"];
  var STORAGE_KEY = "earTrainingDashboard.v1";
  var SESSION_KEY = "earTrainingDashboard.session";
  var MAX_HISTORY = 8;

  var elements = {
    sessionScore: document.getElementById("sessionScore"),
    lastDelta: document.getElementById("lastDelta"),
    accuracy: document.getElementById("accuracy"),
    answerCount: document.getElementById("answerCount"),

    bestStreak: document.getElementById("bestStreak"),
    allTimeScore: document.getElementById("allTimeScore"),
    allTimeAttempts: document.getElementById("allTimeAttempts"),
    exerciseTitle: document.getElementById("exerciseTitle"),
    difficultyLabel: document.getElementById("difficultyLabel"),
    challengeNumber: document.getElementById("challengeNumber"),
    challengeKey: document.getElementById("challengeKey"),
    answerGrid: document.getElementById("answerGrid"),
    resultBox: document.getElementById("resultBox"),
    skillList: document.getElementById("skillList"),
    historyList: document.getElementById("historyList"),
    staffCanvas: document.getElementById("staffCanvas"),
    playChallenge: document.getElementById("playChallenge"),
    repeatChallenge: document.getElementById("repeatChallenge"),
    nextChallenge: document.getElementById("nextChallenge"),
    resetSession: document.getElementById("resetSession"),
    clearHistory: document.getElementById("clearHistory"),
    difficultySelect: document.getElementById("difficultySelect"),
    tempoControl: document.getElementById("tempoControl"),
    tempoOutput: document.getElementById("tempoOutput"),
    autoPlayToggle: document.getElementById("autoPlayToggle"),
    muteToggle: document.getElementById("muteToggle")
  };

  var audioContext = null;
  var state = {
    mode: "intervals",
    difficulty: 1,
    tempo: 88,
    muted: false,
    autoPlay: false,
    question: 0,
    sessionScore: 0,
    attempts: 0,
    correct: 0,
    streak: 0,
    bestStreak: 0,
    challengeStartedAt: 0,
    answered: false,
    current: null,
    lifetime: {
      score: 0,
      attempts: 0,
      correct: 0,
      bestStreak: 0,
      modeStats: {
        intervals: { attempts: 0, correct: 0 },
        chords: { attempts: 0, correct: 0 },
        scale: { attempts: 0, correct: 0 },
        rhythm: { attempts: 0, correct: 0 }
      },
      history: []
    }
  };

  function loadPersistedState() {
    try {
      var saved = JSON.parse(localStorage.getItem(STORAGE_KEY));
      var session = JSON.parse(localStorage.getItem(SESSION_KEY));

      if (saved && typeof saved === "object") {
        state.lifetime = Object.assign(state.lifetime, saved);
        state.lifetime.modeStats = Object.assign(
          {
            intervals: { attempts: 0, correct: 0 },
            chords: { attempts: 0, correct: 0 },
            scale: { attempts: 0, correct: 0 },
            rhythm: { attempts: 0, correct: 0 }
          },
          saved.modeStats || {}
        );
        state.lifetime.history = Array.isArray(saved.history) ? saved.history.slice(0, MAX_HISTORY) : [];
      }

      if (session && typeof session === "object") {
        state.sessionScore = Number(session.sessionScore) || 0;
        state.attempts = Number(session.attempts) || 0;
        state.correct = Number(session.correct) || 0;
        state.streak = Number(session.streak) || 0;
        state.bestStreak = Number(session.bestStreak) || 0;
        state.question = Number(session.question) || 0;
      }
    } catch (error) {
      localStorage.removeItem(STORAGE_KEY);
      localStorage.removeItem(SESSION_KEY);
    }
  }

  function savePersistedState() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state.lifetime));
    localStorage.setItem(
      SESSION_KEY,
      JSON.stringify({
        sessionScore: state.sessionScore,
        attempts: state.attempts,
        correct: state.correct,
        streak: state.streak,
        bestStreak: state.bestStreak,
        question: state.question
      })
    );
  }

  function getPool(mode, difficulty) {
    var config = MODES[mode];
    return config.pools.slice(0, difficulty).flat();
  }

  function choose(list) {
    return list[Math.floor(Math.random() * list.length)];
  }

  function shuffle(list) {
    var copy = list.slice();
    for (var index = copy.length - 1; index > 0; index -= 1) {
      var swapIndex = Math.floor(Math.random() * (index + 1));
      var temp = copy[index];
      copy[index] = copy[swapIndex];
      copy[swapIndex] = temp;
    }
    return copy;
  }

  function makeChallenge() {
    var pool = getPool(state.mode, state.difficulty);
    var answer = choose(pool);
    var rootMidi = state.mode === "scale" ? 60 : 48 + Math.floor(Math.random() * 13);
    var choices = shuffle(pool).slice(0, Math.min(8, pool.length));

    if (!choices.some(function (item) { return item.label === answer.label; })) {
      choices[Math.floor(Math.random() * choices.length)] = answer;
      choices = shuffle(choices);
    }

    state.question += 1;
    state.answered = false;
    state.challengeStartedAt = performance.now();
    state.current = {
      id: Date.now() + "-" + Math.random().toString(16).slice(2),
      mode: state.mode,
      answer: answer,
      choices: choices,
      rootMidi: rootMidi,
      rootName: NOTE_NAMES[rootMidi % 12],
      createdAt: new Date().toISOString()
    };

    renderAll();
    drawStaff(false);

    if (state.autoPlay) {
      window.setTimeout(playCurrentChallenge, 140);
    }
  }

  function ensureAudio() {
    if (!audioContext) {
      var AudioContextClass = window.AudioContext || window.webkitAudioContext;
      audioContext = new AudioContextClass();
    }

    if (audioContext.state === "suspended") {
      return audioContext.resume();
    }

    return Promise.resolve();
  }

  function midiToFrequency(midi) {
    return 440 * Math.pow(2, (midi - 69) / 12);
  }

  function makeEnvelopeGain(startTime, duration, level) {
    var gain = audioContext.createGain();
    gain.gain.setValueAtTime(0.0001, startTime);
    gain.gain.exponentialRampToValueAtTime(level, startTime + 0.025);
    gain.gain.setValueAtTime(level, Math.max(startTime + 0.03, startTime + duration - 0.08));
    gain.gain.exponentialRampToValueAtTime(0.0001, startTime + duration);
    gain.connect(audioContext.destination);
    return gain;
  }

  function playTone(midi, startTime, duration, level, type) {
    var oscillator = audioContext.createOscillator();
    var filter = audioContext.createBiquadFilter();
    var envelope = makeEnvelopeGain(startTime, duration, level);

    oscillator.type = type || "sine";
    oscillator.frequency.setValueAtTime(midiToFrequency(midi), startTime);
    filter.type = "lowpass";
    filter.frequency.setValueAtTime(1600, startTime);
    filter.Q.setValueAtTime(0.6, startTime);

    oscillator.connect(filter);
    filter.connect(envelope);
    oscillator.start(startTime);
    oscillator.stop(startTime + duration + 0.04);
  }

  function playClick(startTime, accented) {
    var oscillator = audioContext.createOscillator();
    var envelope = makeEnvelopeGain(startTime, 0.065, accented ? 0.34 : 0.22);
    oscillator.type = "square";
    oscillator.frequency.setValueAtTime(accented ? 960 : 620, startTime);
    oscillator.connect(envelope);
    oscillator.start(startTime);
    oscillator.stop(startTime + 0.07);
  }

  function playCurrentChallenge() {
    if (state.muted || !state.current) {
      return;
    }

    ensureAudio().then(function () {
      var now = audioContext.currentTime + 0.04;
      var current = state.current;

      drawStaff(true);

      if (current.mode === "intervals") {
        playTone(current.rootMidi, now, 0.55, 0.23, "sine");
        playTone(current.rootMidi + current.answer.semitones, now + 0.62, 0.72, 0.24, "sine");
      }

      if (current.mode === "chords") {
        current.answer.semitones.forEach(function (semitone, index) {
          playTone(current.rootMidi + semitone, now + index * 0.16, 0.52, 0.16, "triangle");
        });
        current.answer.semitones.forEach(function (semitone) {
          playTone(current.rootMidi + semitone, now + 0.84, 0.92, 0.11, "triangle");
        });
      }

      if (current.mode === "scale") {
        [60, 62, 64, 65, 67, 69, 71, 72].forEach(function (midi, index) {
          playTone(midi, now + index * 0.11, 0.16, 0.12, "sine");
        });
        playTone(60 + current.answer.semitones, now + 1.18, 0.76, 0.24, "sine");
      }

      if (current.mode === "rhythm") {
        var beatDuration = 60 / state.tempo;
        current.answer.pattern.forEach(function (beat) {
          var accented = current.answer.accents.indexOf(beat) !== -1;
          playClick(now + beat * beatDuration, accented);
        });
      }
    });
  }

  function calculatePoints(isCorrect) {
    if (!isCorrect) {
      return 0;
    }

    var elapsed = (performance.now() - state.challengeStartedAt) / 1000;
    var speedBonus = Math.max(0, Math.round(45 - elapsed * 6));
    var levelBonus = state.difficulty * 12;
    var streakBonus = Math.min(35, state.streak * 5);
    return 75 + speedBonus + levelBonus + streakBonus;
  }

  function answerChallenge(label) {
    if (!state.current || state.answered) {
      return;
    }

    state.answered = true;
    var expected = state.current.answer.label;
    var isCorrect = label === expected;

    if (isCorrect) {
      state.streak += 1;
      state.correct += 1;
      state.lifetime.correct += 1;
    } else {
      state.streak = 0;
    }

    var points = calculatePoints(isCorrect);
    state.sessionScore += points;
    state.attempts += 1;
    state.bestStreak = Math.max(state.bestStreak, state.streak);
    state.lifetime.score += points;
    state.lifetime.attempts += 1;
    state.lifetime.bestStreak = Math.max(state.lifetime.bestStreak || 0, state.bestStreak);

    var modeStats = state.lifetime.modeStats[state.current.mode];
    modeStats.attempts += 1;
    if (isCorrect) {
      modeStats.correct += 1;
    }

    var historyEntry = {
      mode: state.current.mode,
      prompt: getPromptLabel(state.current),
      answer: expected,
      choice: label,
      correct: isCorrect,
      points: points,
      time: new Date().toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" })
    };

    state.lifetime.history.unshift(historyEntry);
    state.lifetime.history = state.lifetime.history.slice(0, MAX_HISTORY);

    savePersistedState();
    renderAll();
    renderAnswerFeedback(label, expected);

    elements.resultBox.classList.toggle("correct", isCorrect);
    elements.resultBox.classList.toggle("wrong", !isCorrect);
    elements.resultBox.innerHTML = [
      "<strong>" + (isCorrect ? "+" + points + " points" : "0 points") + "</strong>",
      "<span>" + (isCorrect ? "Correct: " : "Answer: ") + expected + "</span>"
    ].join("");

    elements.lastDelta.textContent = isCorrect ? "+" + points + " last answer" : "Missed last answer";

    window.setTimeout(function () {
      if (state.answered) {
        makeChallenge();
      }
    }, isCorrect ? 900 : 1400);
  }

  function getPromptLabel(challenge) {
    if (challenge.mode === "intervals") {
      return challenge.rootName + " root";
    }

    if (challenge.mode === "chords") {
      return challenge.rootName + " chord";
    }

    if (challenge.mode === "scale") {
      return "C major";
    }

    return state.tempo + " BPM";
  }

  function renderAnswerFeedback(selected, expected) {
    Array.from(elements.answerGrid.querySelectorAll(".answer-button")).forEach(function (button) {
      var label = button.dataset.label;
      button.disabled = true;
      button.classList.toggle("is-correct", label === expected);
      button.classList.toggle("is-wrong", label === selected && label !== expected);
    });
  }

  function renderAll() {
    var modeConfig = MODES[state.mode];
    var accuracy = state.attempts ? Math.round((state.correct / state.attempts) * 100) : 0;

    elements.sessionScore.textContent = formatNumber(state.sessionScore);
    elements.accuracy.textContent = accuracy + "%";
    elements.answerCount.textContent = state.attempts + (state.attempts === 1 ? " answer" : " answers");
    elements.streak.textContent = state.streak;
    elements.bestStreak.textContent = "Best " + Math.max(state.bestStreak, state.lifetime.bestStreak || 0);
    elements.allTimeScore.textContent = formatNumber(state.lifetime.score || 0);
    elements.allTimeAttempts.textContent = (state.lifetime.attempts || 0) + " attempts";
    elements.exerciseTitle.textContent = modeConfig.title;
    elements.difficultyLabel.textContent = "Level " + state.difficulty;
    elements.challengeNumber.textContent = "Question " + Math.max(1, state.question);
    elements.challengeKey.textContent = state.current ? getPromptLabel(state.current) : modeConfig.key;
    elements.difficultySelect.value = String(state.difficulty);
    elements.tempoControl.value = String(state.tempo);
    elements.tempoOutput.value = state.tempo + " BPM";
    elements.autoPlayToggle.checked = state.autoPlay;
    elements.muteToggle.classList.toggle("is-muted", state.muted);
    elements.muteToggle.querySelector("span").textContent = state.muted ? "♩" : "♪";

    Array.from(document.querySelectorAll(".mode-tab")).forEach(function (tab) {
      tab.classList.toggle("is-active", tab.dataset.mode === state.mode);
    });

    renderAnswers();
    renderSkills();
    renderHistory();
  }

  function renderAnswers() {
    if (!state.current) {
      elements.answerGrid.innerHTML = "";
      return;
    }

    elements.answerGrid.innerHTML = state.current.choices
      .map(function (choice) {
        return '<button class="answer-button" type="button" data-label="' + escapeHtml(choice.label) + '">' + escapeHtml(choice.label) + "</button>";
      })
      .join("");
  }

  function renderSkills() {
    elements.skillList.innerHTML = Object.keys(MODES)
      .map(function (mode) {
        var stats = state.lifetime.modeStats[mode] || { attempts: 0, correct: 0 };
        var percent = stats.attempts ? Math.round((stats.correct / stats.attempts) * 100) : 0;
        return [
          '<div class="skill-row">',
          "<header><span>" + MODES[mode].title + "</span><span>" + percent + "%</span></header>",
          '<div class="skill-track"><div class="skill-fill" style="width:' + percent + '%"></div></div>',
          "</div>"
        ].join("");
      })
      .join("");
  }

  function renderHistory() {
    if (!state.lifetime.history.length) {
      elements.historyList.innerHTML = '<li class="empty-history">No attempts yet</li>';
      return;
    }

    elements.historyList.innerHTML = state.lifetime.history
      .map(function (item) {
        var modeTitle = MODES[item.mode].title;
        var label = item.correct ? "Correct" : "Missed";
        return [
          "<li>",
          '<div class="history-main">',
          "<strong>" + escapeHtml(modeTitle) + " · " + escapeHtml(label) + "</strong>",
          "<span>" + escapeHtml(item.prompt) + " · " + escapeHtml(item.answer) + " · " + escapeHtml(item.time) + "</span>",
          "</div>",
          '<span class="history-score">+' + item.points + "</span>",
          "</li>"
        ].join("");
      })
      .join("");
  }

  function drawStaff(active) {
    var canvas = elements.staffCanvas;
    var context = canvas.getContext("2d");
    var rect = canvas.getBoundingClientRect();
    var scale = window.devicePixelRatio || 1;
    var width = Math.max(320, Math.round(rect.width * scale));
    var height = Math.max(220, Math.round(rect.height * scale));

    if (canvas.width !== width || canvas.height !== height) {
      canvas.width = width;
      canvas.height = height;
    }

    context.setTransform(scale, 0, 0, scale, 0, 0);
    context.clearRect(0, 0, rect.width, rect.height);

    var yBase = rect.height * 0.38;
    var staffGap = 16;
    var staffLeft = 38;
    var staffRight = rect.width - 38;
    var noteColor = active ? "#16837a" : "#1d2228";

    context.lineWidth = 1.4;
    context.strokeStyle = "#b9c2c9";

    for (var line = 0; line < 5; line += 1) {
      var y = yBase + line * staffGap;
      context.beginPath();
      context.moveTo(staffLeft, y);
      context.lineTo(staffRight, y);
      context.stroke();
    }

    drawClef(context, staffLeft + 7, yBase + 35, active);

    var notes = getCurrentNotePositions();
    notes.forEach(function (note, index) {
      var x = staffLeft + 98 + index * Math.min(78, (staffRight - staffLeft - 150) / Math.max(1, notes.length - 1));
      var y = yBase + 62 - note.step * 8;
      drawNote(context, x, y, noteColor, note.filled);
    });

    if (state.current && state.current.mode === "rhythm") {
      drawRhythm(context, rect.width, rect.height, active);
    } else {
      drawWave(context, rect.width, rect.height, active);
    }
  }

  function drawClef(context, x, y, active) {
    context.save();
    context.strokeStyle = active ? "#16837a" : "#68727d";
    context.lineWidth = 3;
    context.beginPath();
    context.arc(x + 20, y - 8, 19, 0.7, Math.PI * 2.15);
    context.arc(x + 22, y - 8, 8, 0, Math.PI * 2);
    context.moveTo(x + 22, y - 48);
    context.bezierCurveTo(x + 5, y - 32, x + 40, y - 16, x + 22, y + 36);
    context.stroke();
    context.restore();
  }

  function drawNote(context, x, y, color, filled) {
    context.save();
    context.strokeStyle = color;
    context.fillStyle = filled ? color : "#fffdf8";
    context.lineWidth = 2.4;
    context.beginPath();
    context.ellipse(x, y, 13, 9, -0.35, 0, Math.PI * 2);
    context.fill();
    context.stroke();
    context.beginPath();
    context.moveTo(x + 11, y - 2);
    context.lineTo(x + 11, y - 56);
    context.stroke();
    context.restore();
  }

  function drawWave(context, width, height, active) {
    context.save();
    context.globalAlpha = active ? 0.8 : 0.45;
    context.strokeStyle = active ? "#d78b18" : "#c95643";
    context.lineWidth = 2;
    context.beginPath();
    for (var x = 0; x <= width; x += 8) {
      var y = height - 54 + Math.sin((x + state.question * 8) / 22) * 10;
      if (x === 0) {
        context.moveTo(x, y);
      } else {
        context.lineTo(x, y);
      }
    }
    context.stroke();
    context.restore();
  }

  function drawRhythm(context, width, height, active) {
    if (!state.current) {
      return;
    }

    context.save();
    var pattern = state.current.answer.pattern;
    var maxBeat = Math.max.apply(null, pattern.concat([4]));
    var left = 50;
    var right = width - 50;
    var base = height - 56;
    context.strokeStyle = "#68727d";
    context.lineWidth = 1.4;
    context.beginPath();
    context.moveTo(left, base);
    context.lineTo(right, base);
    context.stroke();

    pattern.forEach(function (beat) {
      var x = left + (beat / maxBeat) * (right - left);
      var accented = state.current.answer.accents.indexOf(beat) !== -1;
      context.fillStyle = accented ? "#c95643" : active ? "#16837a" : "#4c5f9f";
      context.beginPath();
      context.arc(x, base, accented ? 8 : 5, 0, Math.PI * 2);
      context.fill();
    });
    context.restore();
  }

  function getCurrentNotePositions() {
    if (!state.current) {
      return [{ step: 0, filled: true }, { step: 4, filled: true }];
    }

    if (state.current.mode === "intervals") {
      return [
        { step: midiToStaffStep(state.current.rootMidi), filled: true },
        { step: midiToStaffStep(state.current.rootMidi + state.current.answer.semitones), filled: true }
      ];
    }

    if (state.current.mode === "chords") {
      return state.current.answer.semitones.map(function (semitone) {
        return { step: midiToStaffStep(state.current.rootMidi + semitone), filled: true };
      });
    }

    if (state.current.mode === "scale") {
      return [
        { step: midiToStaffStep(60), filled: false },
        { step: midiToStaffStep(60 + state.current.answer.semitones), filled: true }
      ];
    }

    return [
      { step: 0, filled: true },
      { step: 2, filled: true },
      { step: 4, filled: true },
      { step: 5, filled: true }
    ];
  }

  function midiToStaffStep(midi) {
    var semitoneFromC = ((midi - 60) % 12 + 12) % 12;
    var octave = Math.floor((midi - 60) / 12);
    var scaleSteps = {
      0: 0,
      1: 0,
      2: 1,
      3: 1,
      4: 2,
      5: 3,
      6: 3,
      7: 4,
      8: 4,
      9: 5,
      10: 5,
      11: 6
    };
    return scaleSteps[semitoneFromC] + octave * 7;
  }

  function formatNumber(value) {
    return new Intl.NumberFormat("en-US").format(value || 0);
  }

  function escapeHtml(value) {
    return String(value)
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;");
  }

  function bindEvents() {
    document.querySelector(".mode-tabs").addEventListener("click", function (event) {
      var button = event.target.closest(".mode-tab");
      if (!button) {
        return;
      }
      state.mode = button.dataset.mode;
      elements.resultBox.classList.remove("correct", "wrong");
      elements.resultBox.innerHTML = "<strong>" + MODES[state.mode].title + "</strong><span>New question loaded.</span>";
      makeChallenge();
    });

    elements.answerGrid.addEventListener("click", function (event) {
      var button = event.target.closest(".answer-button");
      if (!button) {
        return;
      }
      answerChallenge(button.dataset.label);
    });

    elements.playChallenge.addEventListener("click", playCurrentChallenge);
    elements.repeatChallenge.addEventListener("click", playCurrentChallenge);
    elements.nextChallenge.addEventListener("click", makeChallenge);

    elements.difficultySelect.addEventListener("change", function () {
      state.difficulty = Number(elements.difficultySelect.value);
      makeChallenge();
    });

    elements.tempoControl.addEventListener("input", function () {
      state.tempo = Number(elements.tempoControl.value);
      elements.tempoOutput.value = state.tempo + " BPM";
      if (state.current && state.current.mode === "rhythm") {
        elements.challengeKey.textContent = getPromptLabel(state.current);
      }
    });

    elements.autoPlayToggle.addEventListener("change", function () {
      state.autoPlay = elements.autoPlayToggle.checked;
      savePersistedState();
    });

    elements.muteToggle.addEventListener("click", function () {
      state.muted = !state.muted;
      renderAll();
    });

    elements.resetSession.addEventListener("click", function () {
      state.sessionScore = 0;
      state.attempts = 0;
      state.correct = 0;
      state.streak = 0;
      state.bestStreak = 0;
      state.question = 0;
      elements.lastDelta.textContent = "Ready";
      elements.resultBox.classList.remove("correct", "wrong");
      elements.resultBox.innerHTML = "<strong>Session reset</strong><span>Fresh score is ready.</span>";
      savePersistedState();
      makeChallenge();
    });

    elements.clearHistory.addEventListener("click", function () {
      state.lifetime.history = [];
      savePersistedState();
      renderHistory();
    });

    window.addEventListener("resize", function () {
      drawStaff(false);
    });
  }

  loadPersistedState();
  bindEvents();
  makeChallenge();
})();
    </script>
  </body>
</html>

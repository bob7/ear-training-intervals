<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ear Trainer</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; background: #111; color: #fff; margin: 0; padding: 20px; }
        .container { max-width: 600px; margin: 0 auto; }
        button { padding: 10px 20px; margin: 5px; font-size: 16px; background: #333; color: #fff; border: none; border-radius: 5px; cursor: pointer; display: inline-block; }
        .interval-row { display: flex; align-items: center; justify-content: center; width: 100%; max-width: 340px; }
        .interval-btn { min-width: 220px; text-align: center; }
        .play-btn { padding: 6px 8px; margin-left: 6px; font-size: 14px; background: #222; border-radius: 4px; width: 40px; }
        label { margin: 5px; color: #ccc; }
        .sound-row { margin-top: 12px; }
        #sound-select { font-size: 18px; padding: 2px 6px; }
        #sound-select option { font-size: 18px; }
        button:hover { background: #555; }
        button.correct { background: #4CAF50; }
        button.wrong { background: #f44336; }
        #status { font-size: 18px; margin: 20px; min-height: 30px; }
        #score-summary { display: flex; align-items: center; justify-content: center; gap: 16px; margin: 18px 0; }
        #score { font-size: 24px; margin: 0; }
        #success-chart {
            --success: 0%;
            width: 88px;
            height: 88px;
            border-radius: 50%;
            background: conic-gradient(#4CAF50 0 var(--success), #333 var(--success) 100%);
            box-shadow: 0 0 0 1px #444;
        }
        #options { display: flex; flex-direction: column; align-items: center; gap: 8px; margin: 20px 0; }
        #history { margin-top: 24px; text-align: left; background: #1b1b1b; padding: 12px; border-radius: 8px; }
        #history ul { padding-left: 20px; margin: 8px 0 0; }
        .history-item { margin-bottom: 6px; }
        .clear-history-btn { margin-top: 12px; background: #7a2525; }
        .clear-history-btn:hover { background: #a83232; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Ear Trainer: Intervals</h1>
        <div>
            <label><input type="radio" name="mode" value="melodic-asc" checked onchange="setMode()"> Melodic ↑</label>
            <label><input type="radio" name="mode" value="melodic-desc" onchange="setMode()"> Melodic ↓</label>
            <label><input type="radio" name="mode" value="harmonic" onchange="setMode()"> Harmonic</label>
        </div>
        <div class="sound-row">
            <label for="sound-select">Sound:</label>
            <select id="sound-select" onchange="setSoundType()">
                <option value="sine">Sine</option>
                <option value="triangle">Triangle</option>
                <option value="square">Square</option>
                <option value="sawtooth">Sawtooth</option>
                <option value="custom-pulse">Soft Pulse</option>
                <option value="custom-bell">Soft Bell</option>
                <option value="custom-violin">Violin-like</option>
            </select>
        </div>
        <div id="score-summary">
            <div id="success-chart" role="img" aria-label="Current success percentage: 0%"></div>
            <div id="score">Score: 0% (0/0)</div>
        </div>
        <div id="status"></div>
        <button id="next-button" onclick="next()">Start</button>
        <button onclick="repeatLastInterval()">Repeat</button>
        <div id="options"></div>
        <div id="history"></div>
        <button class="clear-history-btn" onclick="clearHistory()">Clear History</button>
    </div>

    <script>
        let audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        let score = 0;
        let questionCount = 0;
        let currentRoot = 0;
        let currentInterval = 0;
        let currentAnswer = '';
        let currentMode = 'melodic-asc';
        let currentSoundType = 'sine';
        let played = false;
        let lastPlayedIntervalName = '';
        let lastPlayedRoot = 0;
        const storageKey = 'earTrainerSessionHistory';
        let sessionHistory = [];
        let deviceId = '';
        let sessionComplete = false;

        const intervals = {
            'Minor 2nd': 1,
            'Major 2nd': 2,
            'Minor 3rd': 3,
            'Major 3rd': 4,
            'Perfect 4th': 5,
            'Tritone': 6,
            'Perfect 5th': 7,
            'Minor 6th': 8,
            'Major 6th': 9,
            'Minor 7th': 10,
            'Major 7th': 11,
            'Octave': 12
        };

        function updateScoreDisplay() {
            const percentage = questionCount === 0
                ? 0
                : Math.round((score / questionCount) * 100);
            const chart = document.getElementById('success-chart');

            document.getElementById('score').textContent = `Score: ${percentage}% (${score}/${questionCount})`;
            chart.style.setProperty('--success', `${percentage}%`);
            chart.setAttribute(
                'aria-label',
                `Current success percentage: ${percentage}%, ${score} correct out of ${questionCount} guesses`
            );
        }

        function loadDeviceId() {
            try {
                deviceId = localStorage.getItem('earTrainerDeviceId') || '';
            } catch (e) {
                deviceId = '';
            }
            if (!deviceId) {
                deviceId = `device-${Date.now()}-${Math.random().toString(16).slice(2)}`;
                try {
                    localStorage.setItem('earTrainerDeviceId', deviceId);
                } catch (e) {}
            }
        }

        function loadSessionHistory() {
            try {
                const saved = localStorage.getItem(storageKey);
                return saved ? JSON.parse(saved) : [];
            } catch (e) {
                return [];
            }
        }

        function renderHistory() {
            const historyEl = document.getElementById('history');
            if (!historyEl) return;
            if (!sessionHistory.length) {
                historyEl.innerHTML = '<p>No sessions recorded yet.</p>';
                return;
            }

            const items = sessionHistory.map(entry => {
                return `<li class="history-item">${entry.date} — ${entry.score}%</li>`;
            }).join('');

            historyEl.innerHTML = `<p>Sessions for this browser/device:</p><ul>${items}</ul>`;
        }

        function saveSessionResult(percent) {
            const entry = {
                date: new Date().toLocaleString(),
                score: percent,
                mode: currentMode,
                sound: currentSoundType,
                device: deviceId
            };
            sessionHistory = [entry, ...sessionHistory].slice(0, 20);
            try {
                localStorage.setItem(storageKey, JSON.stringify(sessionHistory));
            } catch (e) {}
            renderHistory();
        }

        function clearHistory() {
            sessionHistory = [];
            try {
                localStorage.removeItem(storageKey);
            } catch (e) {}
            renderHistory();
        }

        function getSoundSettings(type) {
            switch (type) {
                case 'triangle':
                    return { waveform: 'triangle', gain: 0.7, attack: 0.02, release: 0.18 };
                case 'square':
                    return { waveform: 'square', gain: 0.65, attack: 0.015, release: 0.14 };
                case 'sawtooth':
                    return { waveform: 'sawtooth', gain: 0.6, attack: 0.01, release: 0.16 };
                case 'custom-pulse':
                    return { waveform: 'sine', gain: 0.55, attack: 0.03, release: 0.22 };
                case 'custom-bell':
                    return { waveform: 'sine', gain: 0.5, attack: 0.025, release: 0.24 };
                case 'custom-violin':
                    return { waveform: 'triangle', gain: 0.58, attack: 0.04, release: 0.26 };
                default:
                    return { waveform: 'sine', gain: 0.7, attack: 0.02, release: 0.2 };
            }
        }

        // Schedule a tone with a short gain envelope to avoid clicks
        function playTone(freq, duration = 0.5, when = 0, type = currentSoundType) {
            const startTime = audioCtx.currentTime + when;
            const stopTime = startTime + duration;
            const settings = getSoundSettings(type);

            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = settings.waveform;
            osc.frequency.setValueAtTime(freq, startTime);
            gain.gain.setValueAtTime(0.0001, startTime);
            gain.gain.exponentialRampToValueAtTime(settings.gain, startTime + settings.attack);
            gain.gain.setValueAtTime(settings.gain, stopTime - settings.release);
            gain.gain.exponentialRampToValueAtTime(0.0001, stopTime);

            osc.connect(gain);
            gain.connect(audioCtx.destination);

            osc.start(startTime);
            osc.stop(stopTime + 0.02);
        }

        function noteToFreq(note) {
            return 440 * Math.pow(2, (note - 69) / 12); // A4 = 440Hz, MIDI note 69
        }

        function setMode() {
            currentMode = document.querySelector('input[name="mode"]:checked').value;
        }

        function setSoundType() {
            currentSoundType = document.getElementById('sound-select').value;
        }

        function prepareRoot() {
            currentRoot = Math.floor(Math.random() * 12) + 60; // C4 to B4
            played = true;
        }

        function playInterval() {
            if (!played) prepareRoot();
            let keys = Object.keys(intervals);
            currentAnswer = keys[Math.floor(Math.random() * keys.length)];
            currentInterval = intervals[currentAnswer];

            lastPlayedIntervalName = currentAnswer;
            lastPlayedRoot = currentRoot;

            let secondNote = currentRoot + currentInterval;
            if (currentMode === 'melodic-desc') secondNote = currentRoot - currentInterval;

            audioCtx.resume && audioCtx.resume();
            const latency = 0.05; // small scheduling offset
            if (currentMode === 'harmonic') {
                playTone(noteToFreq(currentRoot), 1.0, latency, currentSoundType);
                playTone(noteToFreq(secondNote), 1.0, latency, currentSoundType);
            } else {
                playTone(noteToFreq(currentRoot), 0.5, latency, currentSoundType);
                // second starts 0.6s after root (matches previous behavior)
                playTone(noteToFreq(secondNote), 0.5, latency + 0.6, currentSoundType);
            }
        }

        function repeatLastInterval() {
            if (!lastPlayedIntervalName || !played) return;

            audioCtx.resume && audioCtx.resume();
            let semitones = intervals[lastPlayedIntervalName];
            if (!semitones) return;

            let target = lastPlayedRoot + semitones;
            if (currentMode === 'melodic-desc') target = lastPlayedRoot - semitones;

            const latency = 0.05;
            if (currentMode === 'harmonic') {
                playTone(noteToFreq(lastPlayedRoot), 1.0, latency, currentSoundType);
                playTone(noteToFreq(target), 1.0, latency, currentSoundType);
            } else {
                playTone(noteToFreq(lastPlayedRoot), 0.5, latency, currentSoundType);
                playTone(noteToFreq(target), 0.5, latency + 0.6, currentSoundType);
            }
        }

        // Play a preview of a named interval (does not submit an answer)
        function playPreviewInterval(name) {
            audioCtx.resume && audioCtx.resume();
            let semitones = intervals[name];
            if (!semitones) return;
            let root = played ? currentRoot : 64;
            let target = root + semitones;
            if (currentMode === 'melodic-desc') target = root - semitones;

            const latency = 0.05;
            if (currentMode === 'harmonic') {
                playTone(noteToFreq(root), 1.0, latency, currentSoundType);
                playTone(noteToFreq(target), 1.0, latency, currentSoundType);
            } else {
                playTone(noteToFreq(root), 0.5, latency, currentSoundType);
                playTone(noteToFreq(target), 0.5, latency + 0.6, currentSoundType);
            }
        }

        function createOptions() {
            let div = document.getElementById('options');
            div.innerHTML = '';
            Object.keys(intervals).forEach(intv => {
                let container = document.createElement('div');
                container.className = 'interval-row';

                let btn = document.createElement('button');
                btn.className = 'interval-btn';
                btn.textContent = intv;
                btn.onclick = () => checkAnswer(intv, btn);

                let play = document.createElement('button');
                play.className = 'play-btn';
                play.textContent = '🔊';
                play.title = 'Play this interval';
                play.onclick = (e) => { e.stopPropagation(); playPreviewInterval(intv); };

                container.appendChild(btn);
                container.appendChild(play);
                div.appendChild(container);
            });
        }

        function resetRound() {
            score = 0;
            questionCount = 0;
            sessionComplete = false;
            updateScoreDisplay();
            document.getElementById('status').textContent = 'Session complete! Starting a new session.';
        }

        function checkAnswer(selected, btn) {
            if (sessionComplete) return;

            if (selected === currentAnswer) {
                score++;
            } else {
                btn.classList.add('wrong');
            }
            questionCount++;
            updateScoreDisplay();
            if (selected === currentAnswer) {
                btn.classList.add('correct');
                document.getElementById('status').textContent = 'Correct!';
            } else {
                document.getElementById('status').textContent = `Wrong. It was ${currentAnswer}`;
            }
            if (questionCount >= 20) {
                sessionComplete = true;
                const percentage = Math.round((score / 20) * 100);
                saveSessionResult(percentage);
                setTimeout(resetRound, 1500);
            }
            setTimeout(() => {
                btn.classList.remove('correct', 'wrong');
            }, 1000);
        }

        function next() {
            document.getElementById('next-button').textContent = 'Next';
            document.getElementById('status').textContent = '';
            played = false;
            playInterval();
        }

        // Init
        loadDeviceId();
        sessionHistory = loadSessionHistory();
        createOptions();
        setMode();
        setSoundType();
        updateScoreDisplay();
        renderHistory();
    </script>
</body>
</html>
